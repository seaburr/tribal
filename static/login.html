<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tribal — Sign In</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --text-sec:#94a3b8;
      --blue:    #3b82f6;
      --blue-dk: #2563eb;
      --red:     #ef4444;
      --radius:  6px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .brand img { height: 36px; width: 36px; object-fit: contain; }
    .brand h1 { font-size: 1.3rem; font-weight: 700; }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: .6rem 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-sec);
      font-size: .9rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }
    .pane { display: none; }
    .pane.active { display: block; }
    label {
      display: block;
      font-size: .8rem;
      color: var(--text-sec);
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      padding: .6rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--blue); }
    button[type=submit] {
      width: 100%;
      padding: .65rem;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      cursor: pointer;
      font-weight: 500;
      transition: background .15s;
    }
    button[type=submit]:hover { background: var(--blue-dk); }
    button[type=submit]:disabled { opacity: .6; cursor: default; }
    .error {
      color: var(--red);
      font-size: .82rem;
      margin-bottom: .85rem;
      min-height: 1.1em;
    }
    .hint {
      font-size: .8rem;
      color: var(--text-sec);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img src="/static/tribal_logo.png" alt="" />
    <h1>Tribal</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-signin" onclick="showTab('signin')">Sign In</button>
    <button class="tab-btn" id="tab-register" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- Sign In -->
  <div class="pane active" id="pane-signin">
    <div class="error" id="signin-error"></div>
    <form id="signin-form" onsubmit="doSignin(event)">
      <label for="si-email">Email</label>
      <input type="email" id="si-email" autocomplete="email" required autofocus />
      <label for="si-password">Password</label>
      <input type="password" id="si-password" autocomplete="current-password" required />
      <button type="submit" id="signin-btn">Sign In</button>
    </form>
  </div>

  <!-- Register -->
  <div class="pane" id="pane-register">
    <div class="error" id="reg-error"></div>
    <form id="reg-form" onsubmit="doRegister(event)">
      <label for="reg-name">Name <span style="color:var(--text-sec)">(optional)</span></label>
      <input type="text" id="reg-name" autocomplete="name" />
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" autocomplete="email" required />
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" autocomplete="new-password" required />
      <p class="hint">Password must be at least 8 characters.</p>
      <button type="submit" id="reg-btn">Create Account</button>
    </form>
  </div>
</div>

<script>
function showTab(name) {
  ["signin", "register"].forEach(t => {
    document.getElementById("tab-" + t).classList.toggle("active", t === name);
    document.getElementById("pane-" + t).classList.toggle("active", t === name);
  });
}

async function doSignin(e) {
  e.preventDefault();
  const errEl = document.getElementById("signin-error");
  const btn = document.getElementById("signin-btn");
  errEl.textContent = "";
  btn.disabled = true;
  btn.textContent = "Signing in…";
  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("si-email").value.trim(),
        password: document.getElementById("si-password").value,
      }),
    });
    if (res.ok) {
      window.location.href = "/";
    } else {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || "Sign-in failed. Please try again.";
    }
  } catch {
    errEl.textContent = "Network error. Please try again.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById("reg-error");
  const btn = document.getElementById("reg-btn");
  errEl.textContent = "";
  btn.disabled = true;
  btn.textContent = "Creating account…";
  try {
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("reg-email").value.trim(),
        password: document.getElementById("reg-password").value,
        display_name: document.getElementById("reg-name").value.trim() || null,
      }),
    });
    if (res.ok) {
      window.location.href = "/";
    } else {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || "Registration failed. Please try again.";
    }
  } catch {
    errEl.textContent = "Network error. Please try again.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Create Account";
  }
}
</script>
</body>
</html>
