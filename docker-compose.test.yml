services:
  mysql-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: tribal
      MYSQL_DATABASE: tribal_test
      MYSQL_USER: tribal
      MYSQL_PASSWORD: tribal
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tribal", "-ptribal"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build: .
    environment:
      DATABASE_URL: "mysql+pymysql://tribal:tribal@mysql-test/tribal_test"
    depends_on:
      mysql-test:
        condition: service_healthy
    entrypoint: >
      sh -c "alembic upgrade head &&
             python -m pytest tests/ -v --tb=short"
