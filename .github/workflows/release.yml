name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import check
        env:
          DATABASE_URL: "sqlite:///./data/tribal.db"
        run: |
          mkdir -p data
          python -c "from app.main import app; print('Import OK')"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./data/tribal.db"
        run: |
          mkdir -p data
          pytest tests/ -v --ignore=tests/test_mysql.py

  # tag:
  #   needs: test
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: write
  #   outputs:
  #     new_tag: ${{ steps.tag.outputs.new_tag }}
  #   steps:
  #     - uses: actions/checkout@v7
  #       with:
  #         fetch-depth: 0
  #
  #     - name: Bump version and push tag
  #       id: tag
  #       uses: mathieudutour/github-tag-action@v6.2
  #       with:
  #         github_token: ${{ secrets.GITHUB_TOKEN }}
  #         default_bump: patch

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DO Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_TOKEN }}
          password: ${{ secrets.DO_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: registry.digitalocean.com/seaburr/tribal:latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Software Bill of Materials for the shipped image (transitive deps + OS
  # packages). Runs after the image is pushed and is isolated from it: a failure
  # here never blocks the build/deploy. Scans the exact digest just built.
  sbom:
    needs: build-and-push
    runs-on: ubuntu-latest
    # id-token + attestations writes are required for the signed (Sigstore)
    # attestations that appear on the repo's /attestations page.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Log in to DO Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_TOKEN }}
          password: ${{ secrets.DO_TOKEN }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: registry.digitalocean.com/seaburr/tribal@${{ needs.build-and-push.outputs.digest }}
          format: cyclonedx-json
          output-file: tribal.sbom.cyclonedx.json
          artifact-name: sbom-cyclonedx-json

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: registry.digitalocean.com/seaburr/tribal@${{ needs.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: tribal.sbom.spdx.json
          artifact-name: sbom-spdx-json

      # Signed, Sigstore-backed attestations recorded in GitHub's attestation
      # store (visible at github.com/seaburr/tribal/attestations). push-to-registry
      # is left off (default) so this does not depend on the DigitalOcean registry
      # supporting OCI 1.1 referrers.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: registry.digitalocean.com/seaburr/tribal
          subject-digest: ${{ needs.build-and-push.outputs.digest }}

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: registry.digitalocean.com/seaburr/tribal
          subject-digest: ${{ needs.build-and-push.outputs.digest }}
          sbom-path: tribal.sbom.spdx.json
