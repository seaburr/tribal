name: Seed Sample Data

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL (e.g. https://dev.tribal-app.xyz)"
        required: false
        default: "https://dev.tribal-app.xyz"
      api_key:
        description: "API key for authentication with target instance."
        required: true
        default: ""

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run seed script
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: python seed.py --api-key "::add-mask::${{ inputs.api_key }}"
